services:
  - type: web
    name: ai-outbound-agent
    runtime: docker
    # Virginia is closest to OpenAI Realtime, ElevenLabs us-east edge,
    # and Twilio's primary US POP — minimizes every network leg of the
    # audio pipeline for callers in the eastern US.
    region: virginia
    # Standard tier (2 GB / 1 vCPU) avoids the CPU throttling spikes
    # that produce 5–10 s tail-latency turns on starter (0.5 vCPU).
    plan: standard
    envVars:
      - key: PORT
        value: "3000"
      - key: BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o"
      - key: OPENAI_REALTIME_MODEL
        value: "gpt-realtime"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: TTS_PROVIDER
        value: "elevenlabs"
      - key: STT_PROVIDER
        value: "openai"
      - key: AUDIOSOCKET_ENABLED
        value: "true"
      - key: AUDIOSOCKET_PORT
        value: "9092"
      - key: DEBUG
        value: "false"
