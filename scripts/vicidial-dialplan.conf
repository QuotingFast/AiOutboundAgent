; ==========================================================================
; Asterisk Dialplan for AI Outbound Agent — AudioSocket Integration
; ==========================================================================
;
; Add this to your extensions.conf (or extensions_custom.conf for FreePBX).
;
; OPTION A: Direct AudioSocket (bypasses AGI, no lead context)
; OPTION B: AGI-managed (recommended for VICIdial — passes lead data)
;
; For VICIdial, use OPTION B.  The AGI script registers a session with lead
; context, then connects AudioSocket.  After disconnect, it checks the
; outcome and handles transfers.
;
; ==========================================================================

; ── OPTION A: Direct AudioSocket (simple, no lead context) ────────────────
;
; Use this if you just want to point a call at the AI with no metadata.
; The AI will use default settings / campaign.

[ai-direct]
exten => s,1,Answer()
same  => n,Set(UUID=${SHELL(uuidgen)})
same  => n,AudioSocket(${UUID},10.0.0.100:9092)
same  => n,Hangup()

; ── OPTION B: VICIdial AGI-managed (recommended) ─────────────────────────
;
; VICIdial calls this context when a call enters AUTO_DROP.
; The AGI script handles session registration, AudioSocket, and outcome.
;
; In VICIdial campaign settings:
;   - Drop Action: AGI
;   - Drop Script: vicidial-agi.pl

[ai-autodrop]
exten => s,1,Answer()
same  => n,AGI(vicidial-agi.pl)
same  => n,Hangup()

; ── OPTION C: Inbound IVR → AI Agent ─────────────────────────────────────
;
; Route inbound calls to the AI agent (e.g., after-hours or overflow).

[ai-inbound]
exten => _X.,1,Answer()
same  => n,Set(UUID=${SHELL(uuidgen)})
same  => n,AudioSocket(${UUID},10.0.0.100:9092)
same  => n,Hangup()

; ── Transfer context (called by AGI after AI qualifies the lead) ──────────
;
; If the AI decides to transfer, the AGI script sets AI_TRANSFER_NUMBER
; and dials into this context.

[ai-transfer]
exten => _X.,1,NoOp(AI Transfer to ${AI_TRANSFER_NUMBER})
same  => n,Dial(SIP/${AI_TRANSFER_NUMBER},60,tT)
same  => n,Hangup()

; ==========================================================================
; ENVIRONMENT VARIABLES (set in /etc/asterisk/extensions.conf or systemd)
;
;   AI_SERVICE_URL=http://10.0.0.100:3000
;   AI_AUDIOSOCKET_HOST=10.0.0.100
;   AI_AUDIOSOCKET_PORT=9092
;   AI_CAMPAIGN_ID=campaign-consumer-auto
;
; Replace 10.0.0.100 with your AI service server IP.
; ==========================================================================
